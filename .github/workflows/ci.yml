name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs of the same branch (saves CI minutes on rebases / amended pushes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-test:
    name: ${{ matrix.package }} (typecheck + test)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [core, cli, app-memory_letta, app-base]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install (workspace root)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck -w @block-agent/${{ matrix.package }}

      - name: Test
        run: npm run test -w @block-agent/${{ matrix.package }}

      # cwd data-leak guard: every App takes an EXPLICIT data dir (no implicit cwd
      # fallback — the hardening that removed each app's `?? APPS_DIR` / module-top
      # `process.cwd()` default). If a test constructs an app without a dir, its jsonl
      # would land in `<repo>/.block-agent` instead of a temp dir. Fail loudly so a
      # missed injection is a red build, not a silent leak.
      - name: Assert no cwd data leak (.block-agent at repo root)
        shell: bash
        run: |
          if [ -e .block-agent ]; then
            echo "::error::a test leaked a .block-agent dir at the repo root — an app/test was constructed without an explicit data dir (cwd fallback). Pass an explicit (temp) dir."
            ls -laR .block-agent
            exit 1
          fi
          echo "ok: no .block-agent leaked to the repo root."

  apps-typecheck:
    # The trusted built-in apps under apps/ (UH-1 layout) mostly have no own tests
    # (`test` is `--passWithNoTests`) — EXCEPT app-base, which has a real suite and is
    # in the typecheck-and-test matrix above. core/cli give the rest transitive typecheck,
    # but this job typechecks every workspace directly so a broken app surfaces on its own.
    # One job over all workspaces (--workspaces --if-present) — cheaper than a job per app.
    name: apps typecheck (all workspaces)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install (workspace root)
        run: npm ci

      - name: Typecheck all workspaces
        run: npm run typecheck --workspaces --if-present

  core-closure-check:
    # core must stay runtime-dependency-free (architectural invariant: Letta/Ink/React never enter core).
    # `npm ls --omit=dev -w @block-agent/core` listing anything other than the package itself
    # = a forbidden runtime dependency leaked in.
    name: core closure (no runtime deps)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Assert core has no runtime dependencies
        shell: bash
        run: |
          set -e
          # `npm ls --omit=dev` exits 0 only if the dep tree is clean. We additionally assert
          # that 'letta' never appears anywhere in the closure.
          npm ls --omit=dev -w @block-agent/core
          if npm ls --omit=dev -w @block-agent/core 2>&1 | grep -qi 'letta'; then
            echo "::error::core runtime closure contains 'letta' — Letta SDK must stay isolated in apps/memory_letta."
            exit 1
          fi
          echo "ok: core runtime closure is clean."
